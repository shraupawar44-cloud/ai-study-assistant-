<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🤖 AI Study Assistant</h1>

    <form method="POST">

        <input
        type="text"
        name="question"
        placeholder="Ask your question..."
        required>

        <br><br>

        <button type="submit">
            Ask AI
        </button>

    </form>

    <div class="answer">

        <h2>Answer</h2>

        <p>{{ answer }}</p>

    </div>

</div>

</body>
</html>
